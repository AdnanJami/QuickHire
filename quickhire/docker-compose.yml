services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quickhire-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: quickhire
      POSTGRES_USER: ${PGUSER:-quickhire}
      POSTGRES_PASSWORD: ${PGPASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quickhire-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-quickhire} -d quickhire"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quickhire-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: quickhire
      PGUSER: ${PGUSER:-quickhire}
      PGPASSWORD: ${PGPASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quickhire-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: quickhire-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quickhire-network

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────
networks:
  quickhire-network:
    driver: bridge
